<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🤪 Modo Zoeira Ativado!</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤪</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Righteous&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-pink: #ff006e;
      --neon-blue: #00f5ff;
      --neon-yellow: #ffea00;
      --neon-green: #39ff14;
      --neon-purple: #bf00ff;
      --dark: #0a0a0a;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      font-family: 'Righteous', cursive;
      color: white;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Animação de fundo pulsante */
    @keyframes bgPulse {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.03) 10px, rgba(255,255,255,0.03) 20px),
        repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(0,0,0,0.03) 10px, rgba(0,0,0,0.03) 20px);
      pointer-events: none;
      z-index: 0;
      animation: bgPulse 10s ease infinite;
      background-size: 200% 200%;
    }

    /* Header zoado */
    .header {
      text-align: center;
      padding: 1.5rem 1rem 1rem;
      position: relative;
      z-index: 2;
    }

    .title {
      font-family: 'Bangers', cursive;
      font-size: clamp(2rem, 8vw, 3.5rem);
      color: var(--neon-yellow);
      text-shadow: 
        0 0 10px var(--neon-yellow),
        0 0 20px var(--neon-yellow),
        0 0 30px var(--neon-pink),
        3px 3px 0 var(--neon-pink),
        6px 6px 0 var(--neon-purple);
      animation: glitch 2s infinite;
      letter-spacing: 0.1em;
      transform: rotate(-2deg);
    }

    @keyframes glitch {
      0%, 100% { transform: rotate(-2deg) translate(0); }
      20% { transform: rotate(-2deg) translate(-2px, 2px); }
      40% { transform: rotate(-2deg) translate(2px, -2px); }
      60% { transform: rotate(-2deg) translate(-2px, -2px); }
      80% { transform: rotate(-2deg) translate(2px, 2px); }
    }

    .subtitle {
      font-family: 'Permanent Marker', cursive;
      font-size: clamp(0.85rem, 2.5vw, 1.2rem);
      color: var(--neon-blue);
      text-shadow: 0 0 10px var(--neon-blue);
      margin-top: 0.5rem;
      animation: bounce 1s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Carrossel */
    .carousel-container {
      position: relative;
      max-width: 800px;
      margin: 1rem auto;
      padding: 0 80px;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .carousel {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      border-radius: 20px;
      border: 5px solid var(--neon-pink);
      box-shadow: 
        0 0 20px var(--neon-pink),
        0 0 40px var(--neon-purple),
        0 10px 50px rgba(0,0,0,0.5);
      background: rgba(0,0,0,0.3);
    }

    .carousel-track {
      display: flex;
      transition: transform 0.5s ease-in-out;
      height: 100%;
    }

    .carousel-slide {
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
    }

    .carousel-slide-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(255,0,110,0.3), rgba(191,0,255,0.3));
      font-family: 'Permanent Marker', cursive;
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: white;
      text-align: center;
      padding: 2rem;
    }

    .carousel-slide-placeholder svg {
      width: 80px;
      height: 80px;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    /* Botões de navegação */
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,0,110,0.3);
      border: 2px solid rgba(255,234,0,0.4);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      color: rgba(255,255,255,0.7);
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 10;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 10px rgba(255,0,110,0.3);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      opacity: 0.6;
    }

    .carousel-btn:hover {
      background: rgba(255,0,110,0.6);
      border-color: rgba(255,234,0,0.7);
      color: rgba(255,255,255,0.9);
      transform: translateY(-50%) scale(1.1);
      box-shadow: 0 0 15px rgba(255,234,0,0.5);
      opacity: 0.9;
    }

    .carousel-btn:active {
      transform: translateY(-50%) scale(0.95);
    }

    .carousel-btn-prev { left: 10px; }
    .carousel-btn-right { right: 10px; }

    @media (max-width: 1100px) {
      .carousel-btn-prev { left: 10px; }
      .carousel-btn-right { right: 10px; }
    }

    @media (max-width: 900px) {
      .carousel-container {
        padding: 0 70px;
      }
      
      .carousel-btn {
        width: 45px;
        height: 45px;
        font-size: 1.3rem;
      }
      
      .carousel-btn-prev { left: 10px; }
      .carousel-btn-right { right: 10px; }
    }

    /* Indicadores */
    .carousel-indicators {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1rem;
      padding-bottom: 0.5rem;
    }

    .indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      border: 2px solid white;
      cursor: pointer;
      transition: all 0.3s ease;
      touch-action: manipulation;
    }

    .indicator.active {
      background: var(--neon-yellow);
      box-shadow: 0 0 15px var(--neon-yellow);
      transform: scale(1.3);
    }

    /* Contador */
    .counter {
      text-align: center;
      margin-top: 0.5rem;
      padding-bottom: 1rem;
      font-family: 'Permanent Marker', cursive;
      font-size: 1.2rem;
      color: var(--neon-blue);
      text-shadow: 0 0 10px var(--neon-blue);
    }

    /* Botão voltar */
    .back-btn {
      position: fixed;
      top: 2rem;
      left: 2rem;
      background: rgba(255,0,110,0.3);
      border: 2px solid rgba(255,234,0,0.4);
      color: rgba(255,255,255,0.8);
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      font-family: 'Righteous', cursive;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(255,0,110,0.3);
      z-index: 100;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      opacity: 0.6;
    }

    .back-btn:hover {
      background: rgba(255,0,110,0.6);
      border-color: rgba(255,234,0,0.7);
      color: rgba(255,255,255,1);
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255,234,0,0.5);
      opacity: 0.9;
    }

    /* Emojis flutuantes */
    .floating-emoji {
      position: fixed;
      font-size: 2rem;
      pointer-events: none;
      z-index: 1;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-20px) rotate(5deg); }
      50% { transform: translateY(-10px) rotate(-5deg); }
      75% { transform: translateY(-30px) rotate(3deg); }
    }

    .emoji-1 { top: 10%; left: 10%; animation-delay: 0s; }
    .emoji-2 { top: 20%; right: 15%; animation-delay: 0.5s; }
    .emoji-3 { top: 60%; left: 5%; animation-delay: 1s; }
    .emoji-4 { top: 70%; right: 10%; animation-delay: 1.5s; }
    .emoji-5 { top: 40%; left: 20%; animation-delay: 2s; }
    .emoji-6 { top: 50%; right: 25%; animation-delay: 2.5s; }

    /* Player de música */
    .music-player {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: rgba(255,0,110,0.9);
      border: 3px solid var(--neon-yellow);
      padding: 0.75rem 1.25rem;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 0 20px var(--neon-pink);
      z-index: 100;
      transform: translate3d(0, 0, 0);
      isolation: isolate;
    }

    .music-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--neon-yellow);
      background: rgba(0,0,0,0.5);
      color: var(--neon-yellow);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      touch-action: manipulation;
    }

    .music-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px var(--neon-yellow);
    }

    .music-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .music-waves {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 20px;
    }

    .music-waves span {
      width: 4px;
      background: var(--neon-yellow);
      border-radius: 2px;
      animation: wave 1s ease-in-out infinite;
    }

    .music-waves span:nth-child(1) { height: 8px; animation-delay: 0s; }
    .music-waves span:nth-child(2) { height: 16px; animation-delay: 0.15s; }
    .music-waves span:nth-child(3) { height: 20px; animation-delay: 0.3s; }
    .music-waves span:nth-child(4) { height: 12px; animation-delay: 0.45s; }

    .music-waves.paused span {
      animation-play-state: paused;
    }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }

    @media (max-width: 900px) {
      .carousel-container {
        padding: 0 70px;
      }
      
      .carousel-btn {
        width: 45px;
        height: 45px;
        font-size: 1.3rem;
      }
      
      .carousel-btn-prev { left: 10px; }
      .carousel-btn-right { right: 10px; }
    }

    @media (max-width: 600px) {
      .carousel-container {
        padding: 0 60px;
      }
      
      .back-btn {
        top: 1rem;
        left: 1rem;
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
      }

      .music-player {
        bottom: 1rem;
        right: 1rem;
        padding: 0.5rem 1rem 0.5rem 0.5rem;
      }
      
      .music-btn {
        width: 35px;
        height: 35px;
      }
      
      .header {
        padding: 1rem 0.5rem 0.5rem;
      }
      
      .title {
        font-size: clamp(1.5rem, 8vw, 2.5rem);
      }
      
      .subtitle {
        font-size: clamp(0.75rem, 2.5vw, 1rem);
      }
    }

    /* Overlay de início */
    .start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(102,126,234,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      cursor: pointer;
      transition: opacity 0.6s ease;
    }

    .start-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .start-overlay-icon {
      font-size: 4rem;
      animation: bounce 1.5s ease-in-out infinite;
    }

    .start-overlay-title {
      font-family: 'Bangers', cursive;
      font-size: clamp(2rem, 8vw, 3.5rem);
      color: var(--neon-yellow);
      text-shadow: 
        0 0 10px var(--neon-yellow),
        3px 3px 0 var(--neon-pink);
      text-align: center;
    }

    .start-overlay-subtitle {
      font-family: 'Permanent Marker', cursive;
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      color: white;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Overlay de início -->
  <div class="start-overlay" id="startOverlay">
    <div class="start-overlay-icon">🤪</div>
    <h2 class="start-overlay-title">SIKSIK 4EVER KCT!</h2>
    <p class="start-overlay-subtitle">Clique para começar 🎉</p>
  </div>

  <!-- Emojis flutuantes -->
  <div class="floating-emoji emoji-1">🤪</div>
  <div class="floating-emoji emoji-2">😂</div>
  <div class="floating-emoji emoji-3">🤣</div>
  <div class="floating-emoji emoji-4">😜</div>
  <div class="floating-emoji emoji-5">🥳</div>
  <div class="floating-emoji emoji-6">🎉</div>

  <!-- Botão voltar -->
  <a href="index.html" class="back-btn">← Voltar</a>

  <!-- Player de música -->
  <div class="music-player">
    <button class="music-btn" id="playBtn" aria-label="Tocar/Pausar">
      <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <div class="music-waves paused" id="musicWaves">
      <span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- Áudio -->
  <audio id="bgMusic" loop>
    <source src="musica2.mp3" type="audio/mpeg" />
  </audio>

  <!-- Header -->
  <div class="header">
    <h1 class="title">ACHOU QUE ERA SÓ ISSO?</h1>
    <p class="subtitle">🤪 Fotos que (quase) não deveriam existir 😂</p>
  </div>

  <!-- Carrossel -->
  <div class="carousel-container">
    <div class="carousel">
      <button class="carousel-btn carousel-btn-prev" id="prevBtn" aria-label="Anterior">‹</button>
      <button class="carousel-btn carousel-btn-right" id="nextBtn" aria-label="Próxima">›</button>
      
      <div class="carousel-track" id="carouselTrack">
        <!-- Slides serão gerados dinamicamente pelo JavaScript -->
      </div>
    </div>

    <!-- Indicadores -->
    <div class="carousel-indicators" id="indicators"></div>

    <!-- Contador -->
    <div class="counter" id="counter">0 / 0</div>
  </div>

  <script>
    // Overlay de início
    const startOverlay = document.getElementById('startOverlay');
    const audio = document.getElementById('bgMusic');
    const playBtn = document.getElementById('playBtn');
    const iconPlay = document.getElementById('iconPlay');
    const iconPause = document.getElementById('iconPause');
    const waves = document.getElementById('musicWaves');

    // Fecha overlay e toca música
    startOverlay.addEventListener('click', () => {
      startOverlay.classList.add('hidden');
      audio.play()
        .then(() => setPlaying(true))
        .catch(() => setPlaying(false));
    });

    // Player de música
    function setPlaying(playing) {
      iconPlay.style.display = playing ? 'none' : 'block';
      iconPause.style.display = playing ? 'block' : 'none';
      waves.classList.toggle('paused', !playing);
    }

    playBtn.addEventListener('click', function(e) {
      e.preventDefault();
      if (audio.paused) {
        audio.play().then(() => setPlaying(true)).catch(() => {});
      } else {
        audio.pause();
        setPlaying(false);
      }
    });

    audio.addEventListener('play', () => setPlaying(true));
    audio.addEventListener('pause', () => setPlaying(false));

    // Carrossel dinâmico
    const track = document.getElementById('carouselTrack');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const counter = document.getElementById('counter');
    const indicatorsContainer = document.getElementById('indicators');
    
    const emojis = ['🤪', '😂', '🤣', '😜', '🥳', '🎉', '😆', '🤩', '😝', '🙃', '😁', '🤗', '😎', '🥴', '🤠', '🤡', '👻', '🎭', '🦄', '🌈'];
    const MAX_IMAGES = 20; // Número máximo de imagens a tentar carregar
    let totalSlides = MAX_IMAGES;
    let currentSlide = 0;

    // Cria todos os slides
    function createSlides() {
      for (let i = 1; i <= MAX_IMAGES; i++) {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        
        const img = document.createElement('img');
        img.alt = `Foto zoada ${i}`;
        
        const placeholder = document.createElement('div');
        placeholder.className = 'carousel-slide-placeholder';
        placeholder.style.display = 'none';
        placeholder.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>Foto ${i} ${emojis[(i - 1) % emojis.length]}</span>
        `;
        
        // Tenta carregar .jpg primeiro, se falhar tenta .jpeg
        img.src = `zoeira/${i}.jpg`;
        img.onerror = function() {
          if (this.src.endsWith('.jpg')) {
            this.src = `zoeira/${i}.jpeg`;
          } else {
            this.style.display = 'none';
            placeholder.style.display = 'flex';
          }
        };
        
        slide.appendChild(img);
        slide.appendChild(placeholder);
        track.appendChild(slide);
      }
      
      // Cria indicadores
      for (let i = 0; i < totalSlides; i++) {
        const indicator = document.createElement('div');
        indicator.className = 'indicator';
        if (i === 0) indicator.classList.add('active');
        indicator.addEventListener('click', () => goToSlide(i));
        indicatorsContainer.appendChild(indicator);
      }
      
      updateCarousel();
    }

    function updateCarousel() {
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      counter.textContent = `${currentSlide + 1} / ${totalSlides}`;
      
      const indicators = document.querySelectorAll('.indicator');
      indicators.forEach((ind, idx) => {
        ind.classList.toggle('active', idx === currentSlide);
      });
    }

    function goToSlide(index) {
      currentSlide = index;
      updateCarousel();
    }

    function nextSlide() {
      currentSlide = (currentSlide + 1) % totalSlides;
      updateCarousel();
    }

    function prevSlide() {
      currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
      updateCarousel();
    }

    nextBtn.addEventListener('click', nextSlide);
    prevBtn.addEventListener('click', prevSlide);

    // Suporte a swipe no mobile
    let touchStartX = 0;
    let touchEndX = 0;

    track.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    });

    track.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    });

    function handleSwipe() {
      if (touchEndX < touchStartX - 50) nextSlide();
      if (touchEndX > touchStartX + 50) prevSlide();
    }

    // Navegação por teclado
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') prevSlide();
      if (e.key === 'ArrowRight') nextSlide();
    });

    // Inicia o carrossel
    createSlides();
  </script>
</body>
</html>
